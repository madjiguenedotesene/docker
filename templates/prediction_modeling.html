<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔮 Prédiction</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        #prediction-plot { width: 100%; height: 600px; }
        .loading-spinner { width: 24px; height: 24px; border: 3px solid #e5e7eb; border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .model-card { border-left: 4px solid transparent; }
        .model-card.winner { border-left-color: #10b981; background-color: #f9fafb; }
        
        /* Styles ajoutés UNIQUEMENT pour l'animation du Chat IA (Ne touche pas au reste) */
        .animate-fade-in-up { animation: fadeInUp 0.4s ease-out forwards; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="flex flex-col min-h-screen bg-gray-900 relative">

   <nav class="fixed top-0 left-0 w-full z-50 p-4 bg-gray-900/90 backdrop-blur-md shadow-md border-b border-gray-800">
    <div class="container mx-auto flex justify-between items-center relative h-10">
        <a href="/" class="h-10 flex items-center z-10 hover:opacity-80 transition">
             <img src="static/images/logo.png" alt="Logo Eurosmart Analytics" class="h-12">
        </a>

        <a href="https://polluguard.eurosmart.fr/" target="_blank" class="h-10 flex items-center justify-end z-10 group bg-gray-800/50 px-4 py-2 rounded-full border border-gray-700 hover:border-blue-500 transition-all">
            <span class="text-white text-sm font-bold mr-2 group-hover:text-blue-400">PolluMap</span>
            <img src="static/images/pollugard.png" alt="Lien PolluMap" class="h-8 opacity-90 group-hover:opacity-100">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 ml-2 text-gray-400 group-hover:text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
            </svg>
        </a>
    </div>
    </nav>

    <main class="container mx-auto p-8 flex-grow mt-16">
        
        <h1 class="text-3xl font-extrabold mb-8 text-white text-center">Prédiction 24H</h1>

        <div class="main-card p-8 bg-white rounded-2xl shadow-xl mb-12">
            <form id="prediction-form" class="space-y-6 text-left">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                    
                    <div>
                        <label class="block text-gray-800 font-bold mb-2">Cible</label>
                        <select id="targetCol" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 bg-gray-50"></select>
                    </div>

                    <div>
                        <label class="block text-gray-800 font-bold mb-2">Algorithme</label>
                        <select id="modelSelect" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 bg-gray-50">
                            <option value="all" selected>Comparatif Complet</option>
                            <option value="Linear Regression">Régression Linéaire</option>
                            <option value="ElasticNet">ElasticNet</option>
                            <option value="Random Forest">Random Forest</option>
                            <option value="Gradient Boosting">Gradient Boosting</option>
                            <option value="XGBoost">XGBoost</option>
                            <option value="LightGBM">LightGBM</option>
                            <option value="CatBoost">CatBoost</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-gray-800 font-bold mb-2">Facteurs</label>
                        <select id="explanatoryCols" multiple class="w-full p-3 border rounded-lg h-32 focus:ring-2 focus:ring-blue-500 bg-gray-50"></select>
                    </div>
                </div>

                <div class="text-center pt-6">
                    <button type="submit" id="train-btn" class="btn-gradient px-12 py-3 text-white font-bold rounded-full shadow-lg hover:scale-105 transition transform flex items-center justify-center mx-auto">
                        <span id="train-text">LANCER</span>
                        <span id="train-spinner" class="loading-spinner ml-3 hidden border-white"></span>
                    </button>
                </div>
            </form>
            <div id="message-container" class="mt-4 font-medium text-center"></div>
        </div>

        <div id="results-section" class="hidden space-y-8">
            
            <div id="metrics-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4"></div>

            <div class="main-card p-2 bg-white rounded-2xl shadow-xl overflow-hidden">
                <div id="prediction-plot"></div>
            </div>
             <div class="table-preview overflow-x-auto"><div id="df-preview"></div></div>
                <div id="redirect-btn-container" class="mt-8 flex justify-center hidden">
                    <a href="/comparaison" class="btn-gradient px-10 py-4 text-lg">comparaison →</a>
                </div>
            </div>
        </div>
        

    </main>
     <footer class="footer-transparent text-gray-400 p-6 mt-8 text-center">
        <div class="container mx-auto flex flex-wrap justify-center gap-6">
            <a href="/" class="nav-link">✨ Accueil</a>
            <a href="/upload-data" class="nav-link">📁 Chargement</a>
            <a href="/visualizations" class="nav-link">📈 Visualisation</a>
            <a href="/prediction-modeling" class="nav-link">🔮 Prédiction</a>
            <a href="/comparaison" class="nav-link">🌐 Comparaison</a>
        </div>
    </footer>

    <div id="ai-chat-widget" class="fixed bottom-6 right-6 z-50 flex flex-col items-end text-gray-800">
        
        <div id="ai-chat-window" class="hidden w-80 sm:w-96 bg-white rounded-2xl shadow-2xl overflow-hidden border border-gray-200 mb-4 flex-col h-[450px] transition-all duration-300 transform scale-95 origin-bottom-right">
            
            <div class="bg-gradient-to-r from-blue-600 to-purple-600 p-4 text-white flex justify-between items-center shadow-md">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-white/20 rounded-full flex items-center justify-center text-xl">🤖</div>
                    <div>
                        <h3 class="font-bold text-sm leading-tight">Assistant Prédiction</h3>
                        <p class="text-xs text-blue-100">Explications ML</p>
                    </div>
                </div>
                <button id="close-chat-btn" class="text-white hover:text-red-300 transition text-2xl font-bold leading-none">&times;</button>
            </div>

            <div id="chat-messages" class="flex-grow p-4 overflow-y-auto bg-gray-50 flex flex-col gap-4 text-sm">
                <div class="flex gap-2">
                    <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-sm flex-shrink-0">🤖</div>
                    <div class="bg-white p-3 rounded-2xl rounded-tl-none shadow-sm border border-gray-100 text-gray-700">
                        Bonjour ! Vous êtes dans la section Modélisation.<br><br>
                        Demandez-moi :<br>
                        <i class="text-blue-600">"Qu'est-ce que le R² ?"</i><br>
                        <i class="text-blue-600">"Quel est le meilleur modèle ?"</i>
                    </div>
                </div>
            </div>

            <div class="p-3 bg-white border-t border-gray-100 flex items-center gap-2">
                <input type="text" id="chat-input" placeholder="Posez votre question..." class="flex-grow bg-gray-100 text-gray-700 px-4 py-3 rounded-full outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                <button id="send-chat-btn" class="w-10 h-10 bg-blue-600 hover:bg-blue-700 text-white rounded-full flex items-center justify-center transition-colors shadow-md">
                    ➤
                </button>
            </div>
        </div>

        <button id="open-chat-btn" class="w-16 h-16 bg-gradient-to-r from-blue-600 to-purple-600 rounded-full shadow-2xl flex items-center justify-center text-white text-3xl hover:scale-110 hover:shadow-blue-500/50 transition-all duration-300 animate-bounce">
            💬
        </button>
    </div>

    <script>
        // --- SCRIPT IA CHAT ---
        const chatWindow = document.getElementById('ai-chat-window');
        const openChatBtn = document.getElementById('open-chat-btn');
        const closeChatBtn = document.getElementById('close-chat-btn');
        const chatInput = document.getElementById('chat-input');
        const sendChatBtn = document.getElementById('send-chat-btn');
        const messagesContainer = document.getElementById('chat-messages');

        openChatBtn.addEventListener('click', () => {
            chatWindow.classList.remove('hidden');
            chatWindow.classList.add('flex');
            setTimeout(() => chatWindow.classList.remove('scale-95'), 10);
            openChatBtn.classList.add('hidden');
            chatInput.focus();
        });

        closeChatBtn.addEventListener('click', () => {
            chatWindow.classList.add('scale-95');
            setTimeout(() => {
                chatWindow.classList.add('hidden');
                chatWindow.classList.remove('flex');
                openChatBtn.classList.remove('hidden');
            }, 300);
        });

        const appendMessage = (text, isUser = false) => {
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex gap-2 ${isUser ? 'flex-row-reverse' : ''} animate-fade-in-up`;
            
            const avatar = isUser ? '👤' : '🤖';
            const avatarBg = isUser ? 'bg-purple-100' : 'bg-blue-100';
            const msgStyle = isUser 
                ? 'bg-gradient-to-r from-blue-600 to-purple-600 text-white rounded-tr-none' 
                : 'bg-white border border-gray-100 text-gray-700 rounded-tl-none shadow-sm';

            const formattedText = text.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

            msgDiv.innerHTML = `
                <div class="w-8 h-8 rounded-full ${avatarBg} flex items-center justify-center text-sm flex-shrink-0 shadow-sm">${avatar}</div>
                <div class="p-3 rounded-2xl ${msgStyle} max-w-[85%] break-words">
                    ${formattedText}
                </div>
            `;
            messagesContainer.appendChild(msgDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        };

        const handleSend = async () => {
            const question = chatInput.value.trim();
            if (!question) return;

            appendMessage(question, true);
            chatInput.value = '';
            
            const typingId = 'typing-' + Date.now();
            const typingDiv = document.createElement('div');
            typingDiv.id = typingId;
            typingDiv.className = "text-xs text-gray-400 italic ml-10 animate-pulse";
            typingDiv.innerText = "L'IA analyse votre question...";
            messagesContainer.appendChild(typingDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;

            try {
                const response = await fetch('/ask_ai', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: question })
                });
                const data = await response.json();
                
                document.getElementById(typingId).remove();
                appendMessage(data.response, false);
            } catch (e) {
                document.getElementById(typingId).remove();
                appendMessage("Erreur de connexion au serveur IA.", false);
            }
        };

        sendChatBtn.addEventListener('click', handleSend);
        chatInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleSend(); });

        // --- CONFIGURATION D'ORIGINE ---
        const targetKeywords = ['temp', 'iqa', 'pm', 'co2', 'nox', 'cov'];
        const excludedKeywords = ['date', 'temps', 'heure', 'minute', 'city', 'ville', 'diff', 'rosee', 'lag'];

        // --- DOM ---
        const form = document.getElementById('prediction-form');
        const targetSelect = document.getElementById('targetCol');
        const featureSelect = document.getElementById('explanatoryCols');
        const modelSelect = document.getElementById('modelSelect');
        const trainBtn = document.getElementById('train-btn');
        const spinner = document.getElementById('train-spinner');
        const msgContainer = document.getElementById('message-container');
        const resultsSection = document.getElementById('results-section');
        const metricsGrid = document.getElementById('metrics-grid');
        const redirectContainer = document.getElementById('redirect-btn-container');

        // --- INIT ---
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const res = await fetch('/get_data_columns');
                const data = await res.json();
                if(data.error) return showMsg(data.error, 'red');

                const allCols = data.columns;
                
                // Remplir Cibles
                targetSelect.innerHTML = '';
                const targets = allCols.filter(c => targetKeywords.some(k => c.toLowerCase().includes(k)) && !excludedKeywords.some(ex => c.toLowerCase().includes(ex)));
                targets.forEach(c => targetSelect.add(new Option(c, c)));

                // Remplir Features
                const updateFeatures = () => {
                    featureSelect.innerHTML = '';
                    const currentTarget = targetSelect.value;
                    const features = allCols.filter(c => c !== currentTarget && !excludedKeywords.some(ex => c.toLowerCase().includes(ex)));
                    features.forEach(c => {
                        const opt = new Option(c, c);
                        opt.selected = true;
                        featureSelect.add(opt);
                    });
                };

                targetSelect.addEventListener('change', updateFeatures);
                if(targets.length > 0) updateFeatures();

            } catch(e) { console.error(e); }
        });

        // --- TRAIN ---
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const target = targetSelect.value;
            const features = Array.from(featureSelect.selectedOptions).map(o => o.value);
            const model = modelSelect.value;

            if(!target || features.length === 0) return showMsg("Sélection incomplète", 'red');

            trainBtn.disabled = true;
            document.getElementById('train-text').classList.add('hidden');
            spinner.classList.remove('hidden');
            resultsSection.classList.add('hidden');
            showMsg("", 'black');

            try {
                const res = await fetch('/train_predict', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ targetCol: target, featureCols: features, selectedModel: model })
                });
                const data = await res.json();

                if(res.ok) {
                    renderResults(data);
                    showMsg("", 'green'); 
                } else {
                    showMsg(data.error || "Erreur serveur", 'red');
                }

            } catch(e) {
                showMsg("Erreur technique", 'red');
            } finally {
                trainBtn.disabled = false;
                document.getElementById('train-text').classList.remove('hidden');
                spinner.classList.add('hidden');
            }
        });

        // --- RENDER ---
        function renderResults(data) {
            resultsSection.classList.remove('hidden');
            redirectContainer.classList.remove('hidden');
            metricsGrid.innerHTML = '';
            
            const results = data.results;
            const preds = data.predictions;
            let traces = [];
            
            let bestModel = Object.keys(results).reduce((a, b) => results[a].r2 > results[b].r2 ? a : b);

            Object.keys(results).forEach(name => {
                const m = results[name];
                if(m.error) return;

                const isWinner = name === bestModel;
                const card = document.createElement('div');
                card.className = `model-card bg-white p-4 rounded-xl shadow-sm border border-gray-100 ${isWinner ? 'winner' : ''}`;
                
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-3">
                        <h4 class="font-bold text-gray-800 text-sm">${name}</h4>
                        ${isWinner ? '<span class="text-xs bg-green-100 text-green-800 px-2 py-0.5 rounded font-bold">Top</span>' : ''}
                    </div>
                    <div class="text-sm space-y-1">
                        <div class="flex justify-between">
                            <span class="text-gray-500">R²</span>
                            <span class="font-mono font-bold ${m.r2 > 0.8 ? 'text-green-600' : 'text-yellow-600'}">${(m.r2 * 100).toFixed(1)}%</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-500">MSE</span>
                            <span class="font-mono text-gray-700">${m.mse.toFixed(2)}</span>
                        </div>
                    </div>
                `;
                metricsGrid.appendChild(card);

                if(preds[name]) {
                    traces.push({
                        x: preds[name].map(p => p.time),
                        y: preds[name].map(p => p.value),
                        name: name,
                        mode: 'lines',
                        line: { width: isWinner ? 3 : 1.5, dash: isWinner ? 'solid' : 'dot' }
                    });
                }
            });

            const layout = {
                template: 'plotly_white',
                hovermode: 'x unified',
                margin: {l: 40, r: 20, t: 20, b: 30},
                legend: {orientation: 'h', y: -0.15},
                xaxis: { showgrid: false },
                yaxis: { showgrid: true, gridcolor: '#f0f0f0' }
            };
            Plotly.newPlot('prediction-plot', traces, layout, {responsive: true, displayModeBar: false});
        }

        function showMsg(txt, color) {
            msgContainer.textContent = txt;
            msgContainer.className = `mt-4 text-center font-bold ${color === 'red' ? 'text-red-500' : (color === 'green' ? 'text-green-600' : 'text-gray-700')}`;
        }
    </script>
</body>
</html>
