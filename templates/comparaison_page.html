<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparaison Expert - PolluGard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>

    <style>
        .loading-spinner {
            width: 20px; height: 20px;
            border: 2px solid rgba(0, 0, 0, 0.1);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .white-card {
            background-color: #ffffff !important;
            border-radius: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: none !important;
        }

        .result-card {
            display: flex;
            flex-direction: column;
            height: 75vh; 
            width: 100%; 
            overflow: hidden;
            padding: 1.5rem;
        }

        .plot-wrapper {
            flex-grow: 1; 
            width: 100%; 
            position: relative;
            min-height: 0;
        }

        .js-plotly-plot, .plot-container {
            width: 100% !important;
            height: 100% !important;
        }

        .animate-fade-in-up { animation: fadeInUp 0.4s ease-out forwards; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .mode-btn-active {
            background: #3b82f6;
            color: white;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }
    </style>
</head>
<body class="flex flex-col min-h-screen bg-gray-900 relative">

    <nav class="fixed top-0 left-0 w-full z-50 p-4 bg-gray-900/90 backdrop-blur-md shadow-md border-b border-gray-800">
    <div class="container mx-auto flex justify-between items-center relative h-10">
        <a href="/" class="h-10 flex items-center z-10 hover:opacity-80 transition">
             <img src="static/images/logo.png" alt="Logo Eurosmart Analytics" class="h-12">
        </a>

        <a href="https://polluguard.eurosmart.fr/" target="_blank" class="h-10 flex items-center justify-end z-10 group bg-gray-800/50 px-4 py-2 rounded-full border border-gray-700 hover:border-blue-500 transition-all">
            <span class="text-white text-sm font-bold mr-2 group-hover:text-blue-400">PolluMap</span>
            <img src="static/images/pollugard.png" alt="Lien PolluMap" class="h-8 opacity-90 group-hover:opacity-100">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 ml-2 text-gray-400 group-hover:text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
            </svg>
        </a>
    </div>
    </nav>
 
    <main class="w-full px-4 md:px-8 lg:px-12 flex-grow mb-20 mt-24">
        
        <h1 class="text-3xl md:text-4xl font-extrabold mb-4 text-white text-center">Comparaison Expert</h1>

        <div class="flex justify-center mb-8 gap-4">
            <button id="mode-meteo" onclick="switchMode('meteo')" class="mode-btn-active px-8 py-2 rounded-full font-bold transition">☀️ Météo</button>
            <button id="mode-pollution" onclick="switchMode('pollution')" class="bg-gray-800 text-gray-400 px-8 py-2 rounded-full font-bold transition hover:bg-gray-700">😷 Pollution</button>
        </div>

        <div class="white-card p-6 md:p-10 text-center max-w-6xl mx-auto mb-12">
            <h2 id="config-title" class="text-2xl font-bold mb-6 text-gray-800">Configuration Météo</h2>
            
            <form id="comparison-form" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 text-left">
                    <div>
                        <label id="label-col1" for="col1-select" class="block text-gray-700 font-bold mb-2">Température (°C)</label>
                        <select id="col1-select" class="w-full p-3 border border-gray-300 rounded-lg bg-gray-50 text-gray-900 focus:ring-2 focus:ring-purple-500">
                        </select>
                    </div>
                    <div>
                        <label id="label-col2" for="col2-select" class="block text-gray-700 font-bold mb-2">Humidité (%)</label>
                        <select id="col2-select" class="w-full p-3 border border-gray-300 rounded-lg bg-gray-50 text-gray-900 focus:ring-2 focus:ring-purple-500">
                        </select>
                    </div>
                    <div id="city-input-container">
                        <label for="city-input" class="block text-gray-700 font-bold mb-2">Ville de référence</label>
                        <input type="text" id="city-input" class="w-full p-3 border border-gray-300 rounded-lg bg-gray-50 text-gray-900 focus:ring-2 focus:ring-purple-500" placeholder="Chargement..." required disabled>
                    </div>
                </div>
                
                <div class="p-6 text-center border-t border-gray-100 mt-6">
                    <button type="submit" id="submit-btn" class="btn-gradient px-12 py-3 text-lg text-white font-bold rounded-full shadow-xl hover:scale-105 transition transform" disabled>
                        <span id="btn-text">Lancer la Comparaison</span>
                        <span id="loading-spinner" class="loading-spinner ml-2 hidden inline-block"></span>
                    </button>
                </div>
            </form>
            <div id="message-container" class="mt-4 text-lg font-medium"></div>
        </div>

        <div id="results-container" class="hidden space-y-12 w-full max-w-7xl mx-auto">
            
            <div class="white-card result-card">
                <h3 id="title-plot1" class="text-2xl font-bold mb-2 text-gray-800 flex items-center justify-center gap-2 flex-none">
                    🌡️ Comparaison Température
                </h3>
                <div class="plot-wrapper">
                    <div id="plot1"></div>
                </div>
            </div>

            <div class="white-card result-card">
                <h3 id="title-plot2" class="text-2xl font-bold mb-2 text-gray-800 flex items-center justify-center gap-2 flex-none">
                    💧 Comparaison Humidité
                </h3>
                <div class="plot-wrapper">
                    <div id="plot2"></div>
                </div>
            </div>

            <div id="action-btn-container" class="hidden">
                <div class="white-card p-6 md:p-10 text-center max-w-6xl mx-auto">
                    <button id="downloadGraphsBtn" class="btn-gradient m-2 px-8 py-3 rounded-full text-white font-bold">📸 Télécharger les graphiques</button>
                    <a href="/" class="btn-gradient m-2 inline-block px-8 py-3 rounded-full text-white font-bold no-underline">🏠 Retour Accueil</a>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer-transparent text-gray-400 p-6 mt-8 text-center">
        <div class="container mx-auto flex flex-wrap justify-center gap-6">
            <a href="/" class="nav-link">✨ Accueil</a>
            <a href="/upload-data" class="nav-link">📁 Chargement</a>
            <a href="/visualizations" class="nav-link">📈 Visualisation</a>
            <a href="/prediction-modeling" class="nav-link">🔮 Prédiction</a>
            <a href="/comparaison" class="nav-link">🌐 Comparaison</a>
        </div>
    </footer>

    <div id="ai-chat-widget" class="fixed bottom-6 right-6 z-50 flex flex-col items-end text-gray-800">
        <div id="ai-chat-window" class="hidden w-80 sm:w-96 bg-white rounded-2xl shadow-2xl overflow-hidden border border-gray-200 mb-4 flex-col h-[450px] transition-all duration-300 transform scale-95 origin-bottom-right">
            <div class="bg-gradient-to-r from-blue-600 to-purple-600 p-4 text-white flex justify-between items-center shadow-md">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-white/20 rounded-full flex items-center justify-center text-xl">🤖</div>
                    <div>
                        <h3 class="font-bold text-sm leading-tight">Assistant Expert</h3>
                        <p class="text-xs text-blue-100">Analyse Comparative</p>
                    </div>
                </div>
                <button id="close-chat-btn" class="text-white hover:text-red-300 transition text-2xl font-bold leading-none">&times;</button>
            </div>
            <div id="chat-messages" class="flex-grow p-4 overflow-y-auto bg-gray-50 flex flex-col gap-4 text-sm"></div>
            <div class="p-3 bg-white border-t border-gray-100 flex items-center gap-2">
                <input type="text" id="chat-input" placeholder="Posez votre question..." class="flex-grow bg-gray-100 text-gray-700 px-4 py-3 rounded-full outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                <button id="send-chat-btn" class="w-10 h-10 bg-blue-600 hover:bg-blue-700 text-white rounded-full flex items-center justify-center transition-colors shadow-md">➤</button>
            </div>
        </div>
        <button id="open-chat-btn" class="w-16 h-16 bg-gradient-to-r from-blue-600 to-purple-600 rounded-full shadow-2xl flex items-center justify-center text-white text-3xl hover:scale-110 hover:shadow-blue-500/50 transition-all duration-300 animate-bounce">💬</button>
    </div>

    <script>
        let currentMode = 'meteo';

        // 1. UTILITAIRE AUTO-SÉLECTION
        function selectOptionByText(selectElement, keywords) {
            for (let i = 0; i < selectElement.options.length; i++) {
                const optionText = selectElement.options[i].text.toLowerCase();
                if (keywords.some(key => optionText.includes(key))) {
                    selectElement.selectedIndex = i;
                    break;
                }
            }
        }

        // 2. LOGIQUE SWITCH MODE
        function switchMode(mode) {
            currentMode = mode;
            const btnMeteo = document.getElementById('mode-meteo');
            const btnPollu = document.getElementById('mode-pollution');
            const configTitle = document.getElementById('config-title');
            const label1 = document.getElementById('label-col1');
            const label2 = document.getElementById('label-col2');
            const titlePlot1 = document.getElementById('title-plot1');
            const titlePlot2 = document.getElementById('title-plot2');
            const sel1 = document.getElementById('col1-select');
            const sel2 = document.getElementById('col2-select');

            if(mode === 'meteo') {
                btnMeteo.classList.add('mode-btn-active');
                btnMeteo.classList.remove('bg-gray-800', 'text-gray-400');
                btnPollu.classList.remove('mode-btn-active');
                btnPollu.classList.add('bg-gray-800', 'text-gray-400');
                configTitle.innerText = "Configuration Météo";
                label1.innerText = "Température (°C)";
                label2.innerText = "Humidité (%)";
                titlePlot1.innerHTML = "🌡️ Comparaison Température";
                titlePlot2.innerHTML = "💧 Comparaison Humidité";
                selectOptionByText(sel1, ['temp', 't°']);
                selectOptionByText(sel2, ['hum', 'rh']);
            } else {
                btnPollu.classList.add('mode-btn-active');
                btnPollu.classList.remove('bg-gray-800', 'text-gray-400');
                btnMeteo.classList.remove('mode-btn-active');
                btnMeteo.classList.add('bg-gray-800', 'text-gray-400');
                configTitle.innerText = "Configuration Pollution (OpenAQ)";
                label1.innerText = "Particules PM10";
                label2.innerText = "Particules PM25 / IQA";
                titlePlot1.innerHTML = "😷 Comparaison PM10";
                titlePlot2.innerHTML = "📊 Comparaison IQA / PM2.5";
                selectOptionByText(sel1, ['pm10', 'pm1.0']);
                selectOptionByText(sel2, ['pm25', 'pm2.5', 'iqa']);
            }
            document.getElementById('results-container').classList.add('hidden');
        }

        // 3. CHARGEMENT ET ACTIONS
        document.addEventListener('DOMContentLoaded', function () {
            const form = document.getElementById('comparison-form');
            const resultsContainer = document.getElementById('results-container');
            const submitBtn = document.getElementById('submit-btn');
            const col1Select = document.getElementById('col1-select');
            const col2Select = document.getElementById('col2-select');

            // Charger les colonnes
            fetch('/get_data_columns').then(r => r.json()).then(data => {
                data.columns.forEach(c => {
                    col1Select.add(new Option(c, c));
                    col2Select.add(new Option(c, c));
                });
                // Auto-sélection par défaut au démarrage
                selectOptionByText(col1Select, ['temp', 't°']);
                selectOptionByText(col2Select, ['hum', 'rh']);
            });

            // Charger les villes
            fetch('/get_unique_cities').then(r => r.json()).then(data => {
                const cities = data.cities || [];
                const container = document.getElementById('city-input-container');
                const label = container.querySelector('label');
                container.innerHTML = ''; container.appendChild(label);
                let el = document.createElement(cities.length > 0 ? 'select' : 'input');
                el.id = 'city-input'; el.className = 'w-full p-3 border border-gray-300 rounded-lg bg-gray-50 text-gray-900 focus:ring-2 focus:ring-purple-500';
                if(cities.length > 0) cities.forEach(c => el.add(new Option(c, c)));
                container.appendChild(el);
                submitBtn.disabled = false;
            });

            // Soumission
            form.addEventListener('submit', function (e) {
                e.preventDefault();
                const city = document.getElementById('city-input').value;
                const endpoint = currentMode === 'meteo' ? '/compare_with_meteo' : '/compare_with_pollution';
                
                document.getElementById('btn-text').textContent = "Analyse en cours...";
                document.getElementById('loading-spinner').classList.remove('hidden');
                
                fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        temp_col: col1Select.value, 
                        humidity_col: col2Select.value, 
                        city_name: city 
                    })
                }).then(r => r.json()).then(data => {
                    document.getElementById('btn-text').textContent = "Lancer la Comparaison";
                    document.getElementById('loading-spinner').classList.add('hidden');
                    if (data.status === 'success') {
                        resultsContainer.classList.remove('hidden');
                        document.getElementById('action-btn-container').classList.remove('hidden');
                        const config = { responsive: true, displayModeBar: false };
                        Plotly.newPlot('plot1', JSON.parse(data.plots.temperature).data, JSON.parse(data.plots.temperature).layout, config);
                        Plotly.newPlot('plot2', JSON.parse(data.plots.humidity).data, JSON.parse(data.plots.humidity).layout, config);
                        setTimeout(() => resultsContainer.scrollIntoView({ behavior: 'smooth' }), 100);
                    }
                });
            });

            document.getElementById('downloadGraphsBtn').addEventListener('click', () => {
                Plotly.downloadImage('plot1', { format: 'png', filename: 'comparaison_1' });
                Plotly.downloadImage('plot2', { format: 'png', filename: 'comparaison_2' });
            });
        });

        // Chat IA JS
        const chatWindow = document.getElementById('ai-chat-window');
        const openChatBtn = document.getElementById('open-chat-btn');
        const closeChatBtn = document.getElementById('close-chat-btn');
        const chatInput = document.getElementById('chat-input');
        const sendChatBtn = document.getElementById('send-chat-btn');
        const messagesContainer = document.getElementById('chat-messages');

        openChatBtn.addEventListener('click', () => {
            chatWindow.classList.remove('hidden');
            chatWindow.classList.add('flex');
            openChatBtn.classList.add('hidden');
        });

        closeChatBtn.addEventListener('click', () => {
            chatWindow.classList.add('hidden');
            openChatBtn.classList.remove('hidden');
        });

        function appendMessage(text, isUser = false) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex gap-2 ${isUser ? 'flex-row-reverse' : ''} animate-fade-in-up`;
            const msgStyle = isUser ? 'bg-blue-600 text-white rounded-tr-none' : 'bg-white text-gray-700 rounded-tl-none border shadow-sm';
            msgDiv.innerHTML = `<div class="p-3 rounded-2xl ${msgStyle} max-w-[85%]">${text.replace(/\n/g, '<br>')}</div>`;
            messagesContainer.appendChild(msgDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        sendChatBtn.addEventListener('click', async () => {
            const q = chatInput.value.trim();
            if(!q) return;
            appendMessage(q, true);
            chatInput.value = '';
            const res = await fetch('/ask_ai', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({question: q}) });
            const data = await res.json();
            appendMessage(data.response);
        });
    </script>
</body>
</html>
